    <title>Cuadro de Desarrollo - Quiniela</title>
    <style>
      :root {
        --bg-color: #0b1528;
        --card-bg: #13223f;
        --gold: #d4af37;
        --text: #ffffff;
        --border: #1e355e;
      }

      body {
        margin: 0;
        padding: 20px;
        background-color: var(--bg-color);
        color: var(--text);
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        height: 100vh; /* Ocupa exactamente el alto de la pantalla */
        box-sizing: border-box;
        overflow: hidden; /* Evita que TODA la página haga scroll extraño */
      }

      /* 1. EL CONTENEDOR MAESTRO (Une fases y barra lateral lado a lado) */
      .main-layout {
        display: flex !important;
        flex-direction: row !important; /* Fuerza la alineación horizontal */
        width: 100%;
        height: 100%;
        gap: 20px;
        box-sizing: border-box;
      }

      /* 2. EL CONTENEDOR DE FASES (Permite el scroll horizontal de las columnas) */
      .container {
        flex: 3;
        background-color: rgba(19, 34, 63, 0.2);
        padding: 15px;
        border-radius: 10px;
        border: 1px solid var(--border);

        display: flex !important;
        flex-direction: row !important; /* Pone una columna de fase al lado de la otra */
        gap: 20px !important;
        overflow-x: auto !important; /* Activa el scroll horizontal aquí */
        overflow-y: hidden !important; /* Cancela el scroll vertical general */
        height: 100%;
        box-sizing: border-box;
      }

      /* 3. LAS COLUMNAS DE CADA FASE (16avos, Octavos, etc.) */
      .phase-column {
        display: flex !important;
        flex-direction: column !important; /* Los partidos dentro de la columna van hacia abajo */
        min-width: 240px !important; /* Ancho fijo para que no se aplasten las tarjetas */
        max-width: 240px !important;
        height: 100% !important;
        overflow-y: auto !important; /* Cada columna se desplaza verticalmente por separado */
        box-sizing: border-box;
        padding-right: 5px; /* Espacio sutil para la barra de scroll */
      }

      /* Los títulos h3 fijos arriba de cada columna al scrollear */
      .phase-column h3 {
        text-align: center;
        color: var(--gold);
        font-size: 14px;
        letter-spacing: 1px;
        margin: 0 0 15px 0;
        padding: 10px 0;
        position: sticky;
        top: 0;
        background-color: var(--bg-color); /* Tapa las tarjetas que suben */
        z-index: 10;
      }

      /* 4. PANEL LATERAL (Tabla de posiciones fija a la derecha) */
      .sidebar {
        flex: 1;
        background-color: var(--card-bg);
        border: 2px solid var(--gold);
        border-radius: 10px;
        padding: 20px;
        min-width: 300px;
        max-width: 340px;
        height: 100%; /* Se acopla a la altura de la pantalla */
        overflow-y: auto; /* Permite scroll vertical si la tabla es muy larga */
        box-sizing: border-box;
      }

      .sidebar h2 {
        color: var(--gold);
        margin-top: 0;
        text-align: center;
        font-size: 18px;
        border-bottom: 1px solid var(--border);
        padding-bottom: 10px;
      }

      /* 5. TARJETAS DE PARTIDO (Matchups) */
      .matchup {
        display: flex;
        flex-direction: column;
        background: var(--card-bg);
        border: 2px solid var(--border);
        border-radius: 8px;
        width: 100%; /* Se adapta al ancho de la columna .phase-column */
        padding: 12px;
        box-sizing: border-box;
        margin-bottom: 5px; /* Separación sutil hacia abajo */
      }

      .teams-versus {
        display: flex !important;
        flex-direction: row !important;
        justify-content: space-around !important;
        align-items: center !important;
        margin-bottom: 12px;
      }

      .team-item {
        display: flex !important;
        flex-direction: column !important;
        align-items: center !important;
        text-align: center !important;
        width: 70px;
      }

      .team-flag {
        font-size: 32px !important;
        display: block !important;
        margin-bottom: 4px !important;
        line-height: 1;
      }

      .vs-divider {
        font-size: 14px !important;
        color: var(--gold) !important;
        font-weight: bold !important;
        align-self: center !important;
      }

      .matchup-footer {
        display: flex !important;
        flex-direction: column !important;
        align-items: center !important;
        justify-content: center !important;
        gap: 6px !important;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        padding-top: 8px;
        width: 100%;
      }

      .matchup-footer select {
        background: #0f172a;
        color: white;
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 4px 12px;
        cursor: pointer;
        text-align: center;
        width: 110px;
      }

      .matchup-header {
        text-align: center;
        font-size: 10px;
        color: var(--gold);
        font-weight: bold;
        letter-spacing: 1px;
        margin-bottom: 8px;
        opacity: 0.8;
      }

      .matchup-footer span {
        font-size: 11px !important;
        color: #94a3b8 !important;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .team-name {
        font-size: 13px !important;
        font-weight: bold !important;
        color: #ffffff !important;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 15px;
      }

      th,
      td {
        padding: 10px;
        text-align: left;
        border-bottom: 1px solid var(--border);
      }

      th {
        color: #8a9cb4;
        font-size: 12px;
        text-transform: uppercase;
      }

      /* --- BARRA DE SCROLL SOLO PARA LAS COLUMNAS DE LAS FASES --- */

      /* 1. Definimos el ancho de la barra dentro de las columnas */
      .fase-container::-webkit-scrollbar {
        width: 8px; /* Un poco más delgada para que se vea sutil */
        height: 8px;
      }

      /* 2. El carril/fondo oscuro de la columna */
      .fase-container::-webkit-scrollbar-track {
        background: #0b111e; /* Color oscuro idéntico al fondo de tu app */
        border-radius: 10px;
      }

      /* 3. La barrita gris que se mueve */
      .fase-container::-webkit-scrollbar-thumb {
        background: #1e293b; /* Gris azulado sutil */
        border: 2px solid #0b111e; /* Espaciado para que se vea flotando */
        border-radius: 10px;
      }

      /* 4. El toque premium: cuando pasas el mouse por encima, brilla en azul */
      .fase-container::-webkit-scrollbar-thumb:hover {
        background: #38bdf8; /* Azul brillante */
      }
    </style>
  </head>

      // 2. CONSTRUCTOR DINÁMICO DE FASES
      function generarTorneo() {
        const contenedores = {
          "16avos": document.getElementById("contenedor-16avos"),
          octavos: document.getElementById("contenedor-octavos"),
          cuartos: document.getElementById("contenedor-cuartos"),
          semis: document.getElementById("contenedor-semis"),
          final: document.getElementById("contenedor-final"),
        };

        Object.values(contenedores).forEach((c) => {
          if (c) c.innerHTML = "";
        });

        partidosMundial.forEach((partido) => {
          const targetContainer = contenedores[partido.fase];
          if (!targetContainer) return;

          const esFinal = partido.fase === "final";
          const estiloCard = esFinal
            ? 'style="border: 2px solid var(--gold) !important; background: rgba(241, 196, 15, 0.1) !important;"'
            : "";
          const textoHeader = esFinal
            ? "🏆 GRAN FINAL 🏆"
            : `PARTIDO ${partido.numero}`;
          const textoFooter = esFinal ? "CAMPEÓN:" : "Ganador:";
          const ganadorFijo = partido.ganador || "";

          targetContainer.innerHTML += `
                <div class="matchup" ${estiloCard} onclick="mostrarPronosticosPartido('${partido.id}', 'PARTIDO ${partido.numero}')" style="cursor: pointer;">
                    <div class="matchup-header">${textoHeader}</div>
                    <div class="teams-versus">
                        <div class="team-item">
                            <span class="team-flag">${partido.f1}</span>
                            <span class="team-name">${partido.t1}</span>
                        </div>
                        <div class="vs-divider">VS</div>
                        <div class="team-item">
                            <span class="team-flag">${partido.f2}</span>
                            <span class="team-name">${partido.t2}</span>
                        </div>
                    </div>

                    <div class="matchup-porcentajes" id="porcentajes-${partido.id.toLowerCase()}" style="display: none; font-size: 0.85em; text-align: center; margin: 8px 0; color: #f1c40f; font-weight: bold;"></div>
                    
                    <div class="matchup-footer">
                        <span>${textoFooter}</span>
                        <select class="resultado-real" data-partido="${partido.id}" disabled style="opacity: 1; color: white; background: #1a2a40; border: 1px solid #34495e; cursor: default;">
                            <option value="">-</option>
                            <option value="${partido.t1}" ${ganadorFijo === partido.t1 ? "selected" : ""}>${partido.t1}</option>
                            <option value="${partido.t2}" ${ganadorFijo === partido.t2 ? "selected" : ""}>${partido.t2}</option>
                        </select>
                    </div>
                </div>
              `;
        });
      }
      // 3. ACTUALIZAR EQUIPOS EN LAS FASES SIGUIENTES (Versión Mutación Protegida)
      function actualizarPartidosDependientes() {
        partidosMundial.forEach((partido) => {
          // --- EVALUAR EQUIPO 1 ---
          if (
            typeof partido.t1 === "string" &&
            partido.t1.startsWith("G") &&
            !partido.origenT1
          ) {
            partido.origenT1 = partido.t1;
          }
          const formulaT1 = partido.origenT1 || partido.t1;

          if (typeof formulaT1 === "string" && formulaT1.startsWith("G")) {
            const numProcedencia = formulaT1.replace("G", "");
            const idBuscado = `p${numProcedencia}`;
            const partidoPrevio = partidosMundial.find(
              (p) => p.id === idBuscado,
            );

            // Intentamos sacar el ganador real ignorando los "TBD" que vengan del localStorage bagueado
            let valorGanador = localStorage.getItem(idBuscado);
            if (
              !valorGanador ||
              valorGanador === "TBD" ||
              valorGanador === "-"
            ) {
              valorGanador = partidoPrevio?.ganador || "";
            }

            if (
              valorGanador &&
              valorGanador !== "TBD" &&
              valorGanador !== "-"
            ) {
              partido.t1 = valorGanador;
              partido.f1 = mapaBanderas[valorGanador] || "❓";
            }
          }

          // --- EVALUAR EQUIPO 2 ---
          if (
            typeof partido.t2 === "string" &&
            partido.t2.startsWith("G") &&
            !partido.origenT2
          ) {
            partido.origenT2 = partido.t2;
          }
          const formulaT2 = partido.origenT2 || partido.t2;

          if (typeof formulaT2 === "string" && formulaT2.startsWith("G")) {
            const numProcedencia = formulaT2.replace("G", "");
            const idBuscado = `p${numProcedencia}`;
            const partidoPrevio = partidosMundial.find(
              (p) => p.id === idBuscado,
            );

            let valorGanador = localStorage.getItem(idBuscado);
            if (
              !valorGanador ||
              valorGanador === "TBD" ||
              valorGanador === "-"
            ) {
              valorGanador = partidoPrevio?.ganador || "";
            }

            if (
              valorGanador &&
              valorGanador !== "TBD" &&
              valorGanador !== "-"
            ) {
              partido.t2 = valorGanador;
              partido.f2 = mapaBanderas[valorGanador] || "❓";
            }
          }
        });
      }

      function calcularPuntos() {
        const ranking = [];
        const emojisAmigos = {
          Nico: "💢",
          Alvy: "👻",
          Alfy: "🐷",
          Oskar: "😭",
          Kyo: "🐝",
          Mary: "🌵",
          Gera: "🐱",
          Gui: "☕",
        };

        for (const amigo in pronosticos) {
          let puntos = 0;

          partidosMundial.forEach((partidoObj) => {
            const idPartido = partidoObj.id;

            if (partidoObj.fase === "16avos") {
              const eleccionReal = partidoObj.ganador;
              if (
                eleccionReal &&
                eleccionReal !== "TBD" &&
                eleccionReal !== ""
              ) {
                const pickOriginal = pronosticos[amigo]?.[idPartido];
                if (pickOriginal === eleccionReal) {
                  puntos += 1;
                }
              }
            } else {
              // Octavos en adelante
              const eleccionReal =
                localStorage.getItem(idPartido) || partidoObj.ganador || "";

              if (
                eleccionReal &&
                eleccionReal !== "TBD" &&
                eleccionReal !== ""
              ) {
                const pickReelegido = pronosticosDorados[amigo]?.[idPartido];
                const pickOriginal = pronosticos[amigo]?.[idPartido];

                let ganoPuntoReeleccion = false;

                // 1. ¿Acertó su nuevo pick del repick dinámico? -> +1 punto
                if (pickReelegido === eleccionReal) {
                  puntos += 1;
                  ganoPuntoReeleccion = true;
                }

                // 2. ¿Acertó su pick de la plantilla original? (BONO DORADO) -> +1 punto
                if (pickOriginal === eleccionReal) {
                  puntos += 1;
                }
              }
            }
          });

          ranking.push({ nombre: amigo, puntos: puntos });
        }

        // Ordenar ranking de mayor a menor score
        ranking.sort((a, b) => b.puntos - a.puntos);

        // Renderizar la tabla en el HTML
        const tbody = document.getElementById("tabla-puntuaciones");
        if (tbody) {
          tbody.innerHTML = "";
          ranking.forEach((jugador, indice) => {
            let medalla = "";
            if (indice === 0) medalla = "🥇 ";
            else if (indice === 1) medalla = "🥈 ";
            else if (indice === 2) medalla = "🥉 ";

            const emoji = emojisAmigos[jugador.nombre] || "";
            tbody.innerHTML += `
        <tr>
          <td>${medalla}${jugador.nombre} ${emoji}</td>
          <td style="text-align: right; font-weight: bold;">${jugador.puntos}</td>
        </tr>
      `;
          });
        }
      }
      // 5. ESCUCHADOR DE CAMBIOS GENERALIZADO
      document.addEventListener("change", function (e) {
        if (e.target.classList.contains("resultado-real")) {
          const partidoId = e.target.getAttribute("data-partido");
          localStorage.setItem(partidoId, e.target.value);
          restablecerValoresBase();
          actualizarPartidosDependientes();
          generarTorneo();
          calcularPuntos();
        }
      });

      function restablecerValoresBase() {
        const bases = {
          p17: { t1: "G1", t2: "G2" },
          p18: { t1: "G3", t2: "G4" },
          p19: { t1: "G5", t2: "G6" },
          p20: { t1: "G7", t2: "G8" },
          p21: { t1: "G9", t2: "G10" },
          p22: { t1: "G11", t2: "G12" },
          p23: { t1: "G13", t2: "G14" },
          p24: { t1: "G15", t2: "G16" },
          p25: { t1: "G17", t2: "G18" },
          p26: { t1: "G19", t2: "G20" },
          p27: { t1: "G21", t2: "G22" },
          p28: { t1: "G23", t2: "G24" },
          p29: { t1: "G25", t2: "G26" },
          p30: { t1: "G27", t2: "G28" },
          p31: { t1: "G29", t2: "G30" },
        };
        partidosMundial.forEach((p) => {
          if (bases[p.id]) {
            if (!localStorage.getItem(`p${bases[p.id].t1.replace("G", "")}`)) {
              p.t1 = bases[p.id].t1;
              p.f1 = "❓";
            }
            if (!localStorage.getItem(`p${bases[p.id].t2.replace("G", "")}`)) {
              p.t2 = bases[p.id].t2;
              p.f2 = "❓";
            }
          }
        });
      }

      // 6. INICIALIZADOR ÚNICO DE CARGA
      document.addEventListener("DOMContentLoaded", () => {
        // 1. Primero resolvemos las dependencias de los equipos (quién va contra quién)
        actualizarPartidosDependientes();

        // 2. Luego calculamos los puntos de la quiniela basándonos en esos equipos
        calcularPuntos();

        // 3. Al final, pintamos el torneo completo en la pantalla con los datos ya listos
        generarTorneo();
      });

      // 📊 FUNCIÓN COMPLETA CON PORCENTAJES Y LISTA DE AMIGOS
      function mostrarPronosticosPartido(idPartido, numeroPartidoTexto) {
        document.getElementById("titulo-pronosticos").innerText =
          `Pronósticos cargados - ${numeroPartidoTexto}:`;
        const listaUL = document.getElementById("lista-pronosticos");
        listaUL.innerHTML = "";

        const idEnMinuscula = idPartido.toLowerCase();

        // Buscamos el partido en nuestro seeder para saber los nombres exactos de los equipos activos
        const datosPartido = partidosMundial.find(
          (p) => p.id === idEnMinuscula,
        );
        if (!datosPartido) return;

        const nombreE1 = datosPartido.t1;
        const nombreE2 = datosPartido.t2;

        let votosEquipo1 = 0;
        let votosEquipo2 = 0;
        let totalAmigosConVoto = 0;

        // Recorrer los pronósticos reales del objeto 'pronosticos'
        for (const amigo in pronosticos) {
          const pick = pronosticos[amigo][idEnMinuscula];

          const li = document.createElement("li");
          li.innerHTML = `<strong>${amigo}</strong>: ${pick || "por definir"}`;
          listaUL.appendChild(li);

          if (pick === nombreE1) {
            votosEquipo1++;
            totalAmigosConVoto++;
          } else if (pick === nombreE2) {
            votosEquipo2++;
            totalAmigosConVoto++;
          }
        }

        // Ocultar primero todos los contenedores de porcentaje previos para que solo se vea el activo
        document
          .querySelectorAll(".matchup-porcentajes")
          .forEach((box) => (box.style.display = "none"));

        // Calcular y mostrar porcentaje en la tarjeta correspondiente
        const contenedorPorcentaje = document.getElementById(
          `porcentajes-${idEnMinuscula}`,
        );
        if (contenedorPorcentaje) {
          if (totalAmigosConVoto > 0) {
            const pct1 = Math.round((votosEquipo1 / totalAmigosConVoto) * 100);
            const pct2 = Math.round((votosEquipo2 / totalAmigosConVoto) * 100);
            contenedorPorcentaje.innerHTML = `📊 ${nombreE1} ${pct1}% — ${pct2}% ${nombreE2}`;
          } else {
            contenedorPorcentaje.innerHTML = "📊 Sin pronósticos válidos";
          }
          contenedorPorcentaje.style.display = "block";
        }
      }
